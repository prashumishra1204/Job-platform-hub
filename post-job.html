<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - JobHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-briefcase"></i>
                <span>JobHub</span>
            </div>
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="jobs.html">Browse Jobs</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="post-job.html" class="active">Post a Job</a>
                <div id="auth-buttons">
                    <a href="login.html" class="btn-login">Login</a>
                    <a href="register.html" class="btn-register">Register</a>
                </div>
                <div id="user-menu" style="display:none;">
                    <div class="user-dropdown">
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="dropdown-content">
                            <a href="dashboard.html">My Dashboard</a>
                            <a href="#" id="logout-btn">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <h2>Post a New Job</h2>
        <form id="post-job-form">
            <div class="form-group">
                <label>Job Title *</label>
                <input type="text" id="job-title" required>
            </div>
            
            <div class="form-group">
                <label>Company Name *</label>
                <input type="text" id="company-name" required>
            </div>
            
            <div class="form-group">
                <label>Location *</label>
                <input type="text" id="location" required>
            </div>
            
            <div class="form-group">
                <label>Job Type *</label>
                <select id="job-type" required>
                    <option value="Full-time">Full-time</option>
                    <option value="Part-time">Part-time</option>
                    <option value="Remote">Remote</option>
                    <option value="Contract">Contract</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Salary Range *</label>
                <input type="text" id="salary" placeholder="e.g., $80k - $100k" required>
            </div>
            
            <div class="form-group">
                <label>Job Description *</label>
                <textarea id="description" rows="5" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Requirements (comma-separated) *</label>
                <input type="text" id="requirements" placeholder="e.g., Python, Django, React" required>
            </div>
            
            <button type="submit" class="btn-submit">Post Job</button>
        </form>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('post-job-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (!Auth.isAuthenticated()) {
                alert('Please login as employer to post a job!');
                window.location.href = 'login.html';
                return;
            }
            
            if (Auth.currentUser.role !== 'employer') {
                alert('Only employers can post jobs!');
                return;
            }
            
            const jobData = {
                title: document.getElementById('job-title').value,
                company: document.getElementById('company-name').value,
                location: document.getElementById('location').value,
                type: document.getElementById('job-type').value,
                salary: document.getElementById('salary').value,
                description: document.getElementById('description').value,
                requirements: document.getElementById('requirements').value.split(',').map(r => r.trim()),
                employerId: Auth.currentUser.id
            };
            
            Database.addJob(jobData);
            alert('Job posted successfully!');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
