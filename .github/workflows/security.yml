name: Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Trivy safely (pinned)
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.1.0

      # Run scan (stable config)
      - name: Run Trivy Scan
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL

      # Upload SARIF
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Gitleaks (fixed)
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose
