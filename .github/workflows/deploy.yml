name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # or master - check your default branch
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Job Platform Hub
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
        continue-on-error: true  # No package.json yet
      
      - name: Build static site
        run: |
          # No build step needed for static HTML
          echo "Static site ready for deployment"
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: job-platform-hub
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
