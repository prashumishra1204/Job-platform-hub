<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - JobHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-briefcase"></i>
                <span>JobHub</span>
            </div>
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="jobs.html" class="active">Browse Jobs</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="post-job.html">Post a Job</a>
                <div id="auth-buttons">
                    <a href="login.html" class="btn-login">Login</a>
                    <a href="register.html" class="btn-register">Register</a>
                </div>
                <div id="user-menu" style="display:none;">
                    <div class="user-dropdown">
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="dropdown-content">
                            <a href="dashboard.html">My Dashboard</a>
                            <a href="#" id="logout-btn">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 20px;">
        <h1>Browse All Jobs</h1>
        
        <!-- Filters -->
        <div class="search-box" style="margin: 20px 0;">
            <input type="text" id="filter-keyword" placeholder="Job title or company">
            <input type="text" id="filter-location" placeholder="Location">
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Remote">Remote</option>
                <option value="Contract">Contract</option>
            </select>
            <button onclick="filterJobs()"><i class="fas fa-search"></i> Filter</button>
        </div>
        
        <div class="jobs-grid" id="jobs-list"></div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4><i class="fas fa-briefcase"></i> JobHub</h4>
                    <p>Your trusted platform for finding the best talent and opportunities.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <a href="jobs.html">Browse Jobs</a>
                    <a href="post-job.html">Post a Job</a>
                    <a href="dashboard.html">Dashboard</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 JobHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function displayJobs(jobs) {
            const container = document.getElementById('jobs-list');
            if (!container) return;
            
            if (jobs.length === 0) {
                container.innerHTML = '<p style="text-align:center;">No jobs found.</p>';
                return;
            }
            
            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <h3 class="job-title">${job.title}</h3>
                        <span class="tag">${job.type}</span>
                    </div>
                    <div class="job-company">${job.company}</div>
                    <div class="job-details">
                        <span><i class="fas fa-map-marker-alt"></i> ${job.location}</span>
                        <span><i class="fas fa-dollar-sign"></i> ${job.salary}</span>
                    </div>
                    <p>${job.description.substring(0, 100)}...</p>
                    <div class="job-tags">
                        ${job.requirements.slice(0, 3).map(req => `<span class="tag">${req}</span>`).join('')}
                    </div>
                    <button onclick="applyForJob(${job.id})" class="btn-apply">Apply Now</button>
                </div>
            `).join('');
        }
        
        function filterJobs() {
            const keyword = document.getElementById('filter-keyword')?.value || '';
            const location = document.getElementById('filter-location')?.value || '';
            const type = document.getElementById('filter-type')?.value || '';
            
            const filtered = Database.getJobs({ keyword, location, type });
            displayJobs(filtered);
        }
        
        function applyForJob(jobId) {
            if (!Auth.isAuthenticated()) {
                alert('Please login to apply for jobs!');
                window.location.href = 'login.html';
                return;
            }
            
            if (Auth.currentUser.role !== 'employee') {
                alert('Only employees can apply for jobs!');
                return;
            }
            
            try {
                Database.applyForJob(Auth.currentUser.id, jobId);
                alert('Application submitted successfully!');
            } catch (error) {
                alert(error.message);
            }
        }
        
        // Load all jobs on page load
        document.addEventListener('DOMContentLoaded', () => {
            const allJobs = Database.getJobs();
            displayJobs(allJobs);
        });
    </script>
</body>
</html>
